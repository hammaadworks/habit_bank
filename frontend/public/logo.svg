<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo_grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891B2"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Vault Outer Shape with BRAND RADIUS (roughly 2.5rem equivalent) -->
  <rect width="120" height="120" rx="40" fill="url(#logo_grad)"/>
  
  <!-- Technical Data Detail -->
  <path d="M20 40H100M20 60H100M20 80H100" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Main Icon: Ledger Vault -->
  <g filter="url(#shadow)">
    <!-- Shield / Vault Door -->
    <path d="M60 28L88 42V78L60 92L32 78V42L60 28Z" fill="white" fill-opacity="0.1" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Kinetic Ledger Bars (High Contrast White) -->
    <rect x="46" y="58" width="6" height="20" rx="3" fill="white"/>
    <rect x="57" y="48" width="6" height="30" rx="3" fill="white"/>
    <rect x="68" y="53" width="6" height="25" rx="3" fill="white"/>
    
    <!-- Center Node -->
    <circle cx="60" cy="38" r="2" fill="white"/>
  </g>
</svg>
