services:
  backend:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "uv sync --frozen && 
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    command: >
      sh -c "corepack enable pnpm && 
             pnpm install && 
             pnpm dev"
    depends_on:
      - backend
